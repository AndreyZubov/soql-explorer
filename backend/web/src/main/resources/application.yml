# Default configuration. Per-environment overrides live in application-{profile}.yml.
spring:
  application:
    name: soql-explorer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

soqlexplorer:
  security:
    jwt:
      issuer: soql-explorer
      # MUST be overridden in every non-local profile via env var or Vault.
      secret: ${JWT_SIGNING_KEY:change-me-in-production-this-is-a-dev-only-secret-min-32-chars}
      access-token-ttl-seconds: 900
      refresh-token-ttl-seconds: 604800
  salesforce:
    client-id: ${SF_CLIENT_ID:}
    client-secret: ${SF_CLIENT_SECRET:}
    redirect-uri: ${SF_REDIRECT_URI:http://localhost:8080/connections/oauth/callback}
    spa-callback-redirect: ${SF_SPA_REDIRECT:http://localhost:5173/connections}
    scopes: ${SF_SCOPES:api refresh_token offline_access}
    api-version: ${SF_API_VERSION:v60.0}
    token-refresh-skew: 2m
    http-timeout: 30s
    access-token-cache-ttl: 110m
    # 32 random bytes, base64 — generate per environment. Local default below is a placeholder
    # ONLY for development; never use in production.
    refresh-token-encryption-key: ${SF_REFRESH_TOKEN_ENCRYPTION_KEY:dev-only-32-byte-key-please-change-soon}
  cache:
    schema:
      sobjects-ttl: 1h
      describe-ttl: 6h
      describe-max-size: 5000
      sobjects-max-size: 1000

resilience4j:
  circuitbreaker:
    instances:
      salesforce:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - io.soqlexplorer.application.ports.salesforce.SalesforceGatewayException
  retry:
    instances:
      salesforce:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - io.soqlexplorer.application.ports.salesforce.SalesforceGatewayException
        ignore-exceptions:
          - io.soqlexplorer.application.connection.ConnectionNotFoundException
