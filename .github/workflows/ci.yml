name: CI

# Builds, lints, and tests both the backend (Gradle, Java 21) and the
# frontend (Vite, Node 20). Triggered on every push and pull request.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Gradle, Java 21)
    runs-on: ubuntu-latest
    services:
      # Testcontainers handles its own Postgres; this service block is
      # retained as a fallback for future suite slices that need a static
      # Postgres without booting a container per test.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: soql_explorer_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Spotless check
        run: ./gradlew spotlessCheck
      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest
      - name: Build & test
        run: ./gradlew build --no-daemon

  frontend:
    name: Frontend (Vite, Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
