# Performance and stability settings for the Gradle build.
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false

# Pinned Spring Boot / Spring dependency management versions used by the
# `web` and infrastructure modules. Keeping them here lets us bump in one
# place and avoids drift between subprojects.
springBootVersion=3.3.5
springDependencyManagementVersion=1.1.6
